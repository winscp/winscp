[Propagation.rc]
DESCRIPTION_45_LETTERS2="Бесплатен SFTP, SCP, S3 и FTP клиент за Windows"
DESCRIPTION_80_LETTERS3="WinSCP е бесплатен управувач со датотеки за Windows кој поддржува FTP, SFTP, S3 и WebDAV."
DESCRIPTION_250_LETTERS4="WinSCP е популарен бесплатен управувач со датотеки за Windows кој поддржува SFTP, FTP, FTPS, SCP, S3, WebDAV и локален-до-локален пренос на датотеки. Моќна алатка за подобрување на вашата продуктивност со кориснички интерфејс и опции за автоматизација како .NET assembly."
DESCRIPTION_450_LETTERS4="WinSCP е популарен бесплатен управувач со датотеки за Windows кој поддржува SFTP, FTP, FTPS, SCP, S3, WebDAV и локален-до-локален пренос на датотеки. Моќна алатка за подобрување на вашата продуктивност со кориснички интерфејс и опции за автоматизација како .NET assembly или batch скриптирање. Користете WinSCP исто така за уредување датотеки, синхронизација на директориуми и управување со сајтови. WinSCP е отворен код и добро документиран. Достапен е на англиски и многу други јазици."
DESCRIPTION_2000_LETTERS3="WinSCP е популарен бесплатен SFTP и FTP клиент за Windows. Покрај тоа, WinSCP е моќен универзален управувач со датотеки кој ќе ја подобри вашата продуктивност. WinSCP може да копира датотеки меѓу локален и оддалечен компјутер користејќи повеќе протоколи: Amazon S3, FTP, FTPS, SCP, SFTP или WebDAV. WinSCP може да копира датотеки меѓу две локални папки исто така. Од една страна, WinSCP нуди лесен за користење графички кориснички интерфејс; можете да изберете меѓу изглед на Windows Explorer и интерфејс со панели со јазичиња како Norton Commander. Од друга страна, напредни корисници можат да ја автоматизираат функционалноста на WinSCP користејќи .NET assembly или едноставно batch скриптирање. Ќе го користите WinSCP за сите вообичаени операции со датотеки. Можете да почнете со уредување на датотека директно од WinSCP, користејќи го внатрешниот текстуален уредувач на WinSCP или интеграција со вашиот омилен надворешен текстуален уредувач. Операциите на WinSCP не се ограничени на поединечни датотеки; WinSCP нуди исто така неколку начини за синхронизација на директориуми. По поврзувањето со сајт можете да изберете да ги зачувате информациите за сајтот за повторлив пристап, WinSCP може дури да ги споделува поставките за сајтови со друга популарна алатка со отворен код PuTTY. WinSCP се интегрира исто така со Pageant (PuTTY агент за автентикација) за целосна поддршка на автентикација со јавен клуч со SSH. Администраторите ја сакаат WinSCP поддршката за преносна работа користејќи конфигурациска датотека наместо записи во регистарот, погодна за работа од преносни медиуми. Сеопфатна WinSCP документација е слободно достапна на https://winscp.net/. Овој сајт има исто така многу активен кориснички форум за поддршка и барања за функции. WinSCP е достапен на <англиски> и многу други јазици. WinSCP е софтвер со отворен код дистрибуиран бесплатно под условите на GNU General Public License (GPL)."
