EDITOR_EARLY_CLOSED2="Уредувачот (апликацијата) стартуван за отворање на датотеката '%s' беше затворен предрано. Ако не беше затворен од вас, може да се случило затоа што вашиот надворешен уредувач отвора повеќе датотеки во еден прозорец (процес). Дополнителните стартувани инстанци на уредувачот само ја испраќаат новата датотека до постоечката инстанца и се затвораат веднаш. За да го поддржите овој вид уредувачи, WinSCP мора да го прилагоди своето однесување, да не ја отстранува привремената датотека кога процесот завршува, туку да ја чува додека WinSCP работи. Ова однесување може да се вклучи со исклучување на опцијата 'Надворешниот уредувач отвора секоја датотека во посебен прозорец (процес)'. Ако вашиот уредувач не е од овој вид, игнорирајте ја оваа порака и дозволете датотеката да се отстрани од привремениот директориум сега.\n \nДали сакате да ја отстраните отворената датотека сега? (Со притискање 'Не' ќе го овозможите посебното однесување и ќе ја задржите датотеката во привремената папка.)"
