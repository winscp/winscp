[Propagation.rc]
DESCRIPTION_45_LETTERS2="Besplatni SFTP, SCP, S3 i FTP klijent za Windows"
DESCRIPTION_80_LETTERS3="WinSCP je besplatan menadžer datoteka za Windows koji podržava FTP, SFTP, S3 i WebDAV."
DESCRIPTION_250_LETTERS4="WinSCP je popularan besplatan menadžer datoteka za Windows koji podržava SFTP, FTP, FTPS, SCP, S3, WebDAV i lokalni-do-lokalnog prenos datoteka. Moćan alat za povećanje produktivnosti sa jednostavnim interfejsom i opcijama automatizacije poput .NET assembly."
DESCRIPTION_450_LETTERS4="WinSCP je popularan besplatan menadžer datoteka za Windows koji podržava SFTP, FTP, FTPS, SCP, S3, WebDAV i lokalni-do-lokalnog prenos datoteka. Moćan alat za povećanje produktivnosti sa jednostavnim interfejsom i opcijama automatizacije poput .NET assembly ili batch skriptiranja. Koristite WinSCP i za uređivanje datoteka, sinhronizaciju direktorijuma i upravljanje sajtovima. WinSCP je otvorenog koda i dobro dokumentovan. Dostupan je na engleskom i mnogim drugim jezicima."
DESCRIPTION_2000_LETTERS3="WinSCP je popularan besplatan SFTP i FTP klijent za Windows. Osim toga, WinSCP je moćan univerzalni menadžer datoteka koji će poboljšati vašu produktivnost. WinSCP može kopirati datoteke između lokalnog i udaljenog računara koristeći više protokola: Amazon S3, FTP, FTPS, SCP, SFTP ili WebDAV. WinSCP može kopirati datoteke i između dve lokalne fascikle. S jedne strane, WinSCP nudi lak za korišćenje grafički korisnički interfejs; možete birati između izgleda Windows Explorera i interfejsa sa karticama i dva panela poput Norton Commandera. S druge strane, napredni korisnici mogu automatizovati funkcionalnost WinSCP-a koristeći .NET assembly ili jednostavno batch skriptiranje. WinSCP ćete koristiti za sve uobičajene operacije sa datotekama. Možete početi uređivati datoteku direktno iz WinSCP-a, koristeći WinSCP interni uređivač teksta ili integraciju sa vašim omiljenim spoljnim uređivačem teksta. Operacije WinSCP-a nisu ograničene na pojedinačne datoteke; WinSCP nudi i nekoliko načina za sinhronizaciju direktorijuma. Nakon povezivanja sa sajtom možete sačuvati informacije o sajtu za ponovljeni pristup, WinSCP čak može deliti podešavanja sajta sa drugim popularnim alatom otvorenog koda PuTTY. WinSCP se integriše i sa Pageant-om (PuTTY agent za autentifikaciju) za potpunu podršku autentifikacije javnim ključem putem SSH-a. Administratori vole WinSCP podršku za prenosivi rad koristeći konfiguracionu datoteku umesto unosa u registru, pogodnu za rad sa prenosivih medija. Sveobuhvatna WinSCP dokumentacija slobodno je dostupna na https://winscp.net/. Ovaj sajt takođe ima veoma aktivan korisnički forum za podršku i zahteve za funkcije. WinSCP je dostupan na <engleskom> i mnogim drugim jezicima. WinSCP je softver otvorenog koda koji se distribuira besplatno pod uslovima GNU General Public License (GPL)."
